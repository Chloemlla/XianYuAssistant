name: Build and publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-verify:
    name: Verify backend with MongoDB
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:8.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/xianyu_assistant_test
      AI_ENABLED: "false"
      JWT_SECRET: ci-only-jwt-secret-with-at-least-32-bytes
      BOOTSTRAP_TOKEN: ci-only-bootstrap-token
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run backend tests
        run: |
          chmod +x ./mvnw
          test_count=$(find src/test -type f \( -name '*Test.java' -o -name '*Tests.java' -o -name '*IT.java' \) | wc -l)
          if [ "$test_count" -eq 0 ]; then
            echo "Backend test suite is absent"
            exit 1
          fi
          ./mvnw --batch-mode -DfailIfNoTests=true test
      - name: Reject legacy production storage references
        shell: bash
        run: |
          if grep -R -n -E 'jdbc:sqlite|sqlite-jdbc|mybatis-plus|org\.sqlite|spring\.datasource|vectorstore\.json' pom.xml src/main/java src/main/resources Dockerfile install.sh; then
            exit 1
          fi

  frontend-verify:
    name: Verify frontend contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vue-code
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vue-code/package-lock.json
      - name: Install locked dependencies
        run: npm ci --prefer-offline --no-audit --fund=false
      - name: Require frontend tests
        shell: bash
        run: |
          test_count=$(find src -type f \( -name '*.test.ts' -o -name '*.spec.ts' -o -name '*.test.js' -o -name '*.spec.js' \) | wc -l)
          if [ "$test_count" -eq 0 ]; then
            echo "Frontend unit/component test suite is absent"
            exit 1
          fi
      - name: Type-check
        run: npm run type-check
      - name: Lint without modifying sources
        run: npm run lint
      - name: Run unit and component tests
        run: npm run test:unit
      - name: Build current frontend artifact
        run: npm run build:spring

  release-contract:
    name: Verify release contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify version, channel, and storage documentation
        shell: bash
        run: bash scripts/ci/verify-release-contract.sh 2.0.3

  docker:
    name: Build and publish image
    needs:
      - backend-verify
      - frontend-verify
      - release-contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: image
        shell: bash
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=xianyu-assistant
          cache-to: type=gha,mode=max,scope=xianyu-assistant
