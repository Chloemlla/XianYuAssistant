server:
  port: 12400

app:
  version: 2.0.3

# AI功能开关（默认开启，API Key从数据库xianyu_sys_setting表读取，未配置时AI功能自动降级）
ai:
  enabled: true
  limits:
    max-prompt-characters: ${AI_MAX_PROMPT_CHARACTERS:8000}
    max-concurrent-requests: ${AI_MAX_CONCURRENT_REQUESTS:4}
    request-timeout-seconds: ${AI_REQUEST_TIMEOUT_SECONDS:45}
    max-output-tokens: ${AI_MAX_OUTPUT_TOKENS:1024}
  vectorstore:
    mongodb:
      collection-name: ${MONGODB_VECTOR_COLLECTION:xianyu_vector_store}
      index-name: ${MONGODB_VECTOR_INDEX:xianyu_vector_index}

# JWT配置
jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_ACCESS_EXPIRATION_MS:900000}  # 15分钟（毫秒）
  refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7天（毫秒）

security:
  bootstrap-token: ${BOOTSTRAP_TOKEN:}


spring:
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/xianyu_assistant}
      auto-index-creation: true
  # AI配置说明：
  # - ai_api_key、ai_base_url、ai_model 配置在数据库 xianyu_sys_setting 表中
  # - 通过 DynamicAIChatClientManager 动态读取，支持热更新无需重启
  # - 默认值：base_url=https://dashscope.aliyuncs.com/compatible-mode, model=deepseek-v3

# WebSocket配置（参考Python代码）
websocket:
  # 心跳间隔（秒）
  heartbeat-interval: 15
  # 心跳超时（秒）
  heartbeat-timeout: 5
  # Token刷新间隔（秒，默认1小时）
  token-refresh-interval: 3600
  # Token重试间隔（秒，默认5分钟）
  token-retry-interval: 300
  # 凭证刷新间隔（分钟），用于Cookie保活和_m_h5_tk兜底刷新
  credential-refresh-min-minutes: 15
  credential-refresh-max-minutes: 20
  # 消息过期时间（毫秒，默认5分钟）
  message-expire-time: 300000
  # 人工接管超时（秒，默认1小时）
  manual-mode-timeout: 3600
  # 人工接管切换关键词
  toggle-keywords: 。
  # 模拟人工输入延迟
  simulate-human-typing: false
  # 连接重连延迟（秒）
  reconnect-delay: 5
  # 最大重连次数
  max-reconnect-attempts: 10
  # 消息发送重试次数
  message-retry-attempts: 3
  # 消息发送重试延迟（毫秒）
  message-retry-delay: 1000
  # 打印原始消息开关（解密后的消息）
  print-raw-message: false
